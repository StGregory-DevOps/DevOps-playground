services:
  backend:
    build: .
    container_name: pet_rest_api
    restart: always
    env_file:
      - .env.example
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  db:
    image: postgres:16
    env_file:
      - .env.example
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data

  cache:
    image: redis:7
    env_file:
      - .env.example
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - cache_data:/data

  proxy:
    image: nginx:1.27-alpine
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend


volumes:
  db_data:
  cache_data:




