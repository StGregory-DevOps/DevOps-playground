services:
  web:
    build: .
    container_name: catalog_app
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d catalog"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data

  nginx:
    image: nginx:1.27-alpine
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

# Глобальный блок объявляется в самом низу, С САМОГО НАЧАЛА СТРОКИ (без отступов!)
volumes:
  db_data:
