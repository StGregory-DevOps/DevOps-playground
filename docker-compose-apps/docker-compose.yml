services:
  app:
    build: .
    container_name: app.py
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      postgresdb:
        condition: service_healthy

  postgresdb:
    image: postgres:16
    environment:
      POSTGRES_DB: tododb
      POSTGRES_USER: todouser
      # Безопасно берем пароль из твоего .env файла:
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todouser -d tododb"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgresdb_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

# Глобальный блок объявляется в самом низу, С САМОГО НАЧАЛА СТРОКИ (без отступов!)
volumes:
  postgresdb_data:
  redis_data:
